name: Retrieval Eval

on:
  pull_request:
    paths:
      - 'src/vector_index.rs'
      - 'src/search_engine.rs'
      - 'src/search_eval.rs'
      - 'crates/aicx-retrieve/**'
      - 'tests/retrieval_eval/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Retrieval Evaluation Harness
    runs-on: [self-hosted, ops-linux]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-07
      - name: Run retrieval eval harness
        run: make test-retrieval-eval
      - name: Run search quality budget contract
        run: |
          cargo test -p aicx search_eval::tests
          cargo run --bin aicx -- eval search-quality --strict
