name: Retrieval Eval

on:
  pull_request:
    paths:
      - 'src/vector_index.rs'
      - 'src/search_engine.rs'
      - 'crates/aicx-retrieve/**'
      - 'tests/retrieval_eval/**'

jobs:
  test:
    name: Run Retrieval Evaluation Harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run retrieval eval harness
        run: make test-retrieval-eval
