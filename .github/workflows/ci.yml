name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        if: runner.os == 'Linux'
        with:
          python-version: '3.x'

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: semgrep
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade pip semgrep
          semgrep --config auto --error --quiet

      - name: cargo check -p aicx-parser
        run: cargo check --locked -p aicx-parser

      - name: cargo check -p aicx-memex
        run: cargo check --locked -p aicx-memex

      - name: cargo check -p ai-contexters
        run: cargo check --locked -p ai-contexters --bin aicx --bin aicx-mcp --bin aicx-memex

      - name: cargo clippy
        run: cargo clippy --locked --all-features --all-targets -- -D warnings

      - name: cargo test -p aicx-parser
        run: cargo test --locked -p aicx-parser

      - name: cargo test -p aicx-memex
        run: cargo test --locked -p aicx-memex

      - name: cargo test --bin aicx
        run: cargo test --locked --bin aicx

      - name: cargo test --bin aicx-mcp
        run: cargo test --locked --bin aicx-mcp

      - name: cargo test --bin aicx-memex
        run: cargo test --locked --bin aicx-memex

      - name: cargo fmt
        run: cargo fmt -- --check

      - name: cargo publish --dry-run
        if: runner.os == 'Linux'
        run: |
          cargo publish --locked --dry-run -p aicx-parser
          cargo publish --locked --dry-run -p aicx-memex
          cargo publish --locked --dry-run -p ai-contexters
