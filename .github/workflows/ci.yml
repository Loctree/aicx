name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_MEMEX_REF: 047e63bd9c89bb174fed6e69f9a3a9c203e04981

jobs:
  check:
    name: ${{ matrix.name }}
    runs-on: ${{ fromJSON(matrix.runner) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-self-hosted
            runner: '["self-hosted", "ops-linux"]'
          - name: macos-self-hosted
            runner: '["self-hosted", "dragon-macos"]'

    steps:
      - uses: actions/checkout@v6
        with:
          path: aicx

      - name: Checkout rust-memex sibling
        uses: actions/checkout@v6
        with:
          repository: Loctree/rust-memex
          ref: ${{ env.RUST_MEMEX_REF }}
          path: rust-memex

      - name: Ensure unzip on self-hosted Linux
        if: runner.os == 'Linux'
        run: |
          if command -v unzip >/dev/null 2>&1; then
            exit 0
          fi
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes unzip
          else
            echo "unzip is required on Linux runners for setup-protoc" >&2
            exit 1
          fi

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          # Pin fully-qualified version to bypass arduino/setup-protoc
          # GitHub release-API lookup that fails intermittently on the
          # macos-self-hosted runner (per arduino/setup-protoc#108).
          # v23.4 matches the version Linux successfully resolved at
          # tool-cache stage today, so prost-build/tonic-build compat
          # is identical to the known-good Linux build.
          version: 'v23.4'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        if: runner.os == 'Linux'
        with:
          python-version: '3.x'

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: semgrep
        if: runner.os == 'Linux'
        working-directory: aicx
        run: |
          python -m pip install --upgrade pip semgrep
          semgrep --config auto --error --quiet

      - name: cargo check
        working-directory: aicx
        run: cargo check --locked

      - name: cargo clippy default
        working-directory: aicx
        run: cargo clippy --locked -p aicx --all-targets -- -D warnings

      - name: cargo clippy native GGUF
        working-directory: aicx
        run: |
          cargo clippy --locked -p aicx-embeddings --features gguf -- -D warnings
          cargo clippy --locked -p aicx --features native-embedder --all-targets -- -D warnings

      - name: cargo test
        working-directory: aicx
        # Cross-module AICX_HOME env-var contamination on macOS CI at default
        # parallelism: vector_index / steer_index / crates / store tests each
        # carry their own AICX_HOME_ENV_LOCK (or none), so identical/union
        # re-ingest assertions race on std::env::set_var. --test-threads=2
        # serializes the contending probes deterministically. Proper fix
        # (shared pub(crate) lock) is tracked as a Wave F backlog item.
        run: cargo test --locked --all-targets -- --test-threads=2

      - name: cargo test native GGUF
        working-directory: aicx
        run: |
          cargo test --locked -p aicx-embeddings --features gguf
          cargo test --locked -p aicx --features native-embedder --test native_embedder

      - name: cargo fmt
        working-directory: aicx
        run: cargo fmt -- --check
