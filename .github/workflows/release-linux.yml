name: Release Linux Matrix

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (vX.Y.Z)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  PACKAGE_NAME: aicx

jobs:
  verify-tag:
    name: Verify Release Tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          release_tag="${REF_NAME}"
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="${INPUT_TAG}"
          fi
          if [[ -z "${release_tag}" ]]; then
            echo "release tag is required" >&2
            exit 1
          fi
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${release_tag#v}" >> "${GITHUB_OUTPUT}"

  build-linux:
    name: Build ${{ matrix.target }}
    needs: verify-tag
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binaries
        run: cross build --release --target ${{ matrix.target }} --bin aicx --bin aicx-mcp

      - name: Smoke test
        run: cross test --target ${{ matrix.target }} --workspace --lib

      - name: Package artifacts
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.verify-tag.outputs.version }}
        run: |
          mkdir -p dist/aicx-v${VERSION}-${TARGET}-slim-unsigned
          cp target/${TARGET}/release/aicx dist/aicx-v${VERSION}-${TARGET}-slim-unsigned/
          cp target/${TARGET}/release/aicx-mcp dist/aicx-v${VERSION}-${TARGET}-slim-unsigned/
          cd dist
          tar -czf aicx-v${VERSION}-${TARGET}-slim-unsigned.tar.gz aicx-v${VERSION}-${TARGET}-slim-unsigned/

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/aicx-v*-${{ matrix.target }}-slim-unsigned.tar.gz
          if-no-files-found: error

  upload-release:
    name: Upload to GitHub Release
    needs: [verify-tag, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum -- *.tar.gz > SHA256SUMS

      - name: Upload Linux assets to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.verify-tag.outputs.release_tag }}
        run: |
          gh release upload "${RELEASE_TAG}" dist/* --clobber
