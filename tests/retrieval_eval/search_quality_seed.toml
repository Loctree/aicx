# aicx eval search-quality — curated seed matrix (human-facing evidence drift).
# Separate from the backend 50-query gold set in queries.toml.
#
# Schema: aicx.search_quality_seed.v1
#   id            stable identifier (independent of ordering)
#   scope         project
#   type          "evidence" | "ask_answer"
#                   ask_answer => score evidence relevance (right session/chunk),
#                   NOT narrative quality.
#   query         the (deliberately messy) operator query
#   good_result / bad_result   human description of hit vs miss
#   anchors_match "any_of" | "all_of"  (only meaningful when >1 anchor)
#   frame_lane    roadmap-critical lane: operator_request, agent_decision,
#                 code_tool_exhaust, system_hook, compact_duplicate,
#                 opaque_reasoning
#   expected_identity / expected_frame_kind
#                 stable identity + frame kind a useful top-k hit must expose
#   budget_top_k / min_useful_top_hits / max_forbidden_noise_top_hits
#                 declared usefulness floor and forbidden-noise ceiling
#   max_duplicate_hits_per_anchor
#                 compact-recall inflation guard for duplicated anchors
#   [[questions.forbidden_noise]]
#     class         tool_output_exhaust, system_prompt_echo,
#                   duplicated_compact_recall, opaque_reasoning_block, ...
#     terms         terms that identify the forbidden class in top-k evidence
#     terms_match   "any" | "all"
#   [[questions.anchors]]
#     map_id        session folder in tb-out-anchor-v4-20260619-121218
#     expected_terms  tokens a correct top-hit must contain, CHECKED IN .md BODY
#                     (not .meta.json). terms_match defaults to "any".
#     terms_match   "any" | "all"
#
# Secrets policy: no key fragments in query or expected_terms — only var names,
# locations, and the rotate action.

schema = "aicx.search_quality_seed.v1"
corpus = "tb-out-anchor-v4-20260619-121218"

