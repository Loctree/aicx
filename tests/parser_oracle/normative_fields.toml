owner = "diagnostics"
kernel_fingerprint = false
reason = "Derived arithmetic (ended_at - started_at); recomputable, not source truth, never fingerprinted."

[[field]]
path = "provenance.active_duration_seconds"
class = "heuristic_projection"
owner = "C7 projections"
kernel_fingerprint = false
reason = "Gap-cap policy metric (parameterized by a 600s cap); policy output, not parser truth."

[[field]]
