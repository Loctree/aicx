# Donor field ownership matrix — session_record.v1 (schema 1.2.0) → AICX classes.
# Machine truth for docs/PARSER_NORMATIVE_CONTRACT.md §1.
# Classes: normative | heuristic_projection | diagnostic | out_of_scope.
# kernel_fingerprint = true is legal ONLY for class = "normative" (checker-enforced).
# Owners: "C1 kernel" (SessionModel), "C6 store", "C7 projections", "A1 overlay",
#         "diagnostics" (coverage/warning surface), "donor-only" (not adopted).

schema = "aicx.parser.normative_fields.v1"
donor_schema = "session_record.v1"
donor_schema_version = "1.2.0"

# ---------------------------------------------------------------- top level

[[field]]
path = "schema"
class = "out_of_scope"
owner = "donor-only"
kernel_fingerprint = false
reason = "Donor discriminator literal; AICX model versioning is owned by C1, not copied from the donor."

[[field]]
path = "schema_version"
class = "out_of_scope"
owner = "donor-only"
kernel_fingerprint = false
reason = "Donor semver; AICX kernel versions its own canonical model."

[[field]]
path = "map_id"
class = "out_of_scope"
owner = "donor-only"
kernel_fingerprint = false
reason = "Donor output-directory layout identity; AICX identity is evidence_event_id + store ids, never a derived directory slug."

[[field]]
path = "session_id"
class = "normative"
owner = "C1 kernel"
kernel_fingerprint = true
reason = "Direct source identity (Codex session_meta.id / Claude sessionId / Gemini session_id or filename / Grok summary.info.id / Junie directory id); participates in evidence_event_id."

[[field]]
path = "generated_at"
class = "diagnostic"
owner = "diagnostics"
kernel_fingerprint = false
reason = "Wall-clock creation stamp of the record artifact; wall clock is banned from the canonical fingerprint."

[[field]]
path = "generator.name"
class = "diagnostic"
owner = "diagnostics"
kernel_fingerprint = false
reason = "Producer provenance; determinism is keyed BY adapter version, the version string is not model content."

[[field]]
path = "generator.version"
class = "diagnostic"
owner = "diagnostics"
kernel_fingerprint = false
reason = "Producer provenance; same as generator.name."

[[field]]
path = "generator.adapter"
class = "diagnostic"
owner = "diagnostics"
kernel_fingerprint = false
reason = "Adapter selector provenance; AICX AgentKind is normative separately via provenance.agent."

