# UsageEvent fixture matrix — contract §4.
# Token/cost components are either a non-negative number (known) or the string
# "unknown". Fabricating 0 for an unreported value is a contract violation —
# the type system keeps unknown and zero distinguishable.
# Coverage the checker enforces: cumulative + delta + snapshot semantics,
# known cache tokens, missing (unknown) cost, and mid-session model drift.
# [[invalid_event]] rows MUST be rejected by validation.

schema = "aicx.parser.usage_matrix.v1"

