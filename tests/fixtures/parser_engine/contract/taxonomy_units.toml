# Taxonomy fixture units — contract §2.
# Every unit must terminate in EXACTLY ONE declared taxonomy kind among its
# (agent, level, parent, container_file) candidates, and that kind must equal
# expected_kind. Samples are synthetic contract shapes, not captured bytes.

schema = "aicx.parser.taxonomy_units.v1"

