[package]
name = "aicx"

version = "0.6.2"
edition = "2024"
rust-version = "1.91.1"
description = "Operator CLI + MCP server: canonical corpus first, optional semantic index second (Claude Code, Codex, Gemini)"
authors = ["Maciej Gad <void@div0.space>", "Monika Szymanska <hello@vetcoders.io>"]
license = "BUSL-1.1"
repository = "https://github.com/Loctree/aicx"
homepage = "https://github.com/Loctree/aicx"
documentation = "https://docs.rs/aicx"
readme = "README.md"
keywords = ["ai", "context", "timeline", "claude", "codex"]
categories = ["command-line-utilities", "development-tools"]
exclude = ["*.html", "*.patch", "*.orig", ".ai-agents/", ".ai-context/", "scripts/", "skills/"]
autobins = false
default-run = "aicx"
build = "build.rs"

[features]
default = []
# Native embedder — in-process BERT-style embeddings via Candle.
# Ships a small embedder bundled into the binary when the model is present in
# the HuggingFace cache at build time; falls back to runtime cache lookup.
# Build presets:
#   - base (default, via AICX_BUILD_PROFILE=base): sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
#   - dev   (AICX_BUILD_PROFILE=dev):              harrier-oss/harrier-oss-0.6b
#   - premium (AICX_BUILD_PROFILE=premium):        F2-LLM/F2-LLM-v2-1.7b
# AICX_EMBEDDER_REPO still wins as the exact override.
# Combined with the lightweight base runtime this keeps a complete bundle under
# ~1.1 GB for the default path, while leaving stronger machines an explicit
# opt-in route to larger local models.
native-embedder = [
    "dep:candle-core",
    "dep:candle-nn",
    "dep:candle-transformers",
    "dep:tokenizers",
    "dep:safetensors",
]

[dependencies]
anyhow = "1.0"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
dirs = "6"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
regex = "1"
globset = "0.4"
axum = "0.8"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "net", "signal"] }
rmcp = { version = "1.2", features = ["server", "schemars", "transport-io", "transport-streamable-http-server", "transport-streamable-http-server-session"] }
libc = "0.2.183"
# Local product boundary: aicx now binds directly to the first-party rust-memex
# workspace instead of consuming a published public crate.
rmcp-memex = { package = "rust-memex", path = "../rust-memex/crates/rust-memex", default-features = false }
schemars = "1.2.1"

# Native embedder (optional, feature-gated)
candle-core = { version = "0.9", optional = true }
candle-nn = { version = "0.9", optional = true }
candle-transformers = { version = "0.9", optional = true }
tokenizers = { version = "0.22", optional = true, default-features = false, features = ["onig"] }
safetensors = { version = "0.5", optional = true }

[build-dependencies]
dirs = "6"
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"

[dev-dependencies]
filetime = "0.2"

[patch.crates-io]
lance-namespace-impls = { path = "../rust-memex/vendor/lance-namespace-impls" }

[[bin]]
name = "aicx"
path = "src/main.rs"

[[bin]]
name = "aicx-mcp"
path = "src/bin/aicx_mcp.rs"

[profile.release]
lto = true
strip = true
