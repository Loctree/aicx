[package]
name = "aicx"

version = "0.6.0"
edition = "2024"
rust-version = "1.88"
description = "Operator CLI + MCP server: canonical corpus first, optional semantic index second (Claude Code, Codex, Gemini)"
authors = ["Maciej Gad <void@div0.space>", "Monika Szymanska <hello@vetcoders.io>"]
license = "BUSL-1.1"
repository = "https://github.com/Loctree/aicx"
homepage = "https://github.com/Loctree/aicx"
documentation = "https://docs.rs/aicx"
readme = "README.md"
keywords = ["ai", "context", "timeline", "claude", "codex"]
categories = ["command-line-utilities", "development-tools"]
exclude = ["*.html", "*.patch", "*.orig", ".ai-agents/", ".ai-context/", "scripts/", "skills/"]
autobins = false
default-run = "aicx"
build = "build.rs"

[features]
default = []
# Native embedder — in-process BERT-style embeddings via Candle.
# Ships a small embedder bundled into the binary when the model is present in
# the HuggingFace cache at build time; falls back to runtime cache lookup.
# Suggested include_bytes defaults (override with AICX_EMBEDDER_REPO):
#   - harrier-oss/harrier-oss-0.6b      (~0.6B params, code-focused)
#   - F2-LLM/F2-LLM-v2-1.7b             (~1.7B params, stronger recall)
# Combined with a lean runtime this keeps a complete bundle under ~1.1 GB
# for the 0.6B default. The 1.7B model stays runtime-loaded unless the
# operator opts into a larger bundle.
native-embedder = [
    "dep:candle-core",
    "dep:candle-nn",
    "dep:candle-transformers",
    "dep:tokenizers",
    "dep:safetensors",
]

[dependencies]
anyhow = "1.0"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
dirs = "6"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
regex = "1"
globset = "0.4"
axum = "0.8"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "net", "signal"] }
rmcp = { version = "1.2", features = ["server", "schemars", "transport-io", "transport-streamable-http-server", "transport-streamable-http-server-session"] }
libc = "0.2.183"
# Remote integration boundary: consume the published crate instead of any local workspace checkout
# or path patching. ai-contexters uses the library surface from crates.io here.
rmcp-memex = { version = "0.5.0", default-features = false }
schemars = "1.2.1"

# Native embedder (optional, feature-gated)
candle-core = { version = "0.9", optional = true }
candle-nn = { version = "0.9", optional = true }
candle-transformers = { version = "0.9", optional = true }
tokenizers = { version = "0.22", optional = true, default-features = false, features = ["onig"] }
safetensors = { version = "0.5", optional = true }

[build-dependencies]
dirs = "6"

[dev-dependencies]
filetime = "0.2"

[[bin]]
name = "aicx"
path = "src/main.rs"

[[bin]]
name = "aicx-mcp"
path = "src/bin/aicx_mcp.rs"

[profile.release]
lto = true
strip = true
