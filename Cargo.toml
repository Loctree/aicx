[package]
name = "ai-contexters"
version = "0.5.6"
edition = "2024"
rust-version = "1.85"
description = "Operator CLI + MCP server: canonical corpus first, semantic materialization via memex second (Claude Code, Codex, Gemini)"
authors = ["Maciej Gad <void@div0.space>", "Monika Szymanska <hello@vetcoders.io>"]
license = "MIT"
repository = "https://github.com/VetCoders/ai-contexters"
homepage = "https://github.com/VetCoders/ai-contexters"
documentation = "https://docs.rs/ai-contexters"
readme = "README.md"
keywords = ["ai", "context", "timeline", "claude", "codex"]
categories = ["command-line-utilities", "development-tools"]
exclude = ["*.html", "*.patch", "*.orig", ".ai-agents/", ".ai-context/", "scripts/", "skills/"]
autobins = false
default-run = "aicx"

[workspace]
members = ["crates/aicx-parser", "crates/aicx-memex"]

[dependencies]
aicx-memex = { version = "=0.5.6", path = "crates/aicx-memex" }
aicx-parser = { version = "=0.5.6", path = "crates/aicx-parser" }
anyhow = "1.0"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
regex = "1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
axum = "0.8"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "net", "signal"] }
rmcp = { version = "1.2", features = ["server", "schemars", "transport-io", "transport-streamable-http-server", "transport-streamable-http-server-session"] }
libc = "0.2.183"

[dev-dependencies]
filetime = "0.2"

[[bin]]
name = "aicx"
path = "src/main.rs"

[[bin]]
name = "aicx-mcp"
path = "src/bin/aicx_mcp.rs"

[[bin]]
name = "aicx-memex"
path = "crates/aicx-memex/src/bin/aicx_memex.rs"

[profile.release]
lto = true
strip = true
